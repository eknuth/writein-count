# Example config: the "Pencil" Governor write-in count, Multnomah County 2026 primary.
#
# This file reproduces the original run. Copy it to ./writein.toml (or point
# $WRITEIN_CONFIG at it) and edit for a different contest, term, or scanner.
# Any key you omit falls back to the built-in default in pencilcount/config.py.

# Root of the scanned ballot image tree (box dirs live directly under it).
# Override at runtime with $PENCIL_IMAGES_ROOT or $WRITEIN_IMAGES_ROOT.
images_root = "/Volumes/storage/pencil/BallotImages20260519Primary"

[contest]
# Display name (used in the vision prompt and reports).
name = "Governor"
# Lowercased prefix of the contest header OCR token (stage 2 anchor).
header_token = "govern"
# Lowercased phrases that identify a ballot *front* (stage 1 funnel gate).
front_markers = ["nominating ballot", "official primary"]
# Lowercased exact token that begins the next contest below (stage 2 lower bound).
next_contest_token = "vote"

# Parties printed on the ballot header. `label` is stored in the DB; `match` is
# the lowercased substring searched for in the header OCR. Anything unmatched on
# a front is recorded as "other" and excluded from the partisan tally.
[[parties]]
label = "Democratic"
match = "democratic"

[[parties]]
label = "Republican"
match = "republican"

[target]
# The write-in term being counted (the headline deliverable).
term = "pencil"
strict = 0.84       # >= this fuzzy score -> counted as the target
review_low = 0.60   # [review_low, strict) -> human review queue
low_conf = 0.45     # vision confidence below this -> review even if score is high
canon_strict = 0.84 # whole-string fuzzy threshold to fold a read onto a known name
surname_fuzz = 0.80 # per-token fuzzy threshold against a surname alias
min_alias = 5       # only fuzzy/substring-match aliases at least this long

[vision]
url = "http://localhost:11434/api/generate"
model = "gemma4:12b"
temperature = 0.0
read_workers = 4    # concurrent in-flight requests to the local model

# ---- Ballot geometry (stages 1-3) ----
# These are tuned to Clear Ballot scans. Retune them to port the pipeline to a
# different scanner/county whose ballots place the contest and write-in line
# differently. Bands are page fractions [x0, y0, x1, y1]; pixel values assume the
# scanner's native scan resolution.

[classify]
header_band = [0.0, 0.0, 1.0, 0.13]   # top band OCR'd for title/party/style
style_band = [0.62, 0.0, 1.0, 0.06]   # top-right band holding the style code
style_regex = '\b(\d{4}-\d{1,2}(?:-[A-Z]{1,3})?)\b'  # e.g. 4303-1-WS
numeric_regex = '(\d{4}-\d{1,2})'     # layout key prefix, suffix dropped
target_card_max_h = 2450              # px: separator/target cards are shorter

[locate]
dark = 110            # grayscale ink threshold (0-255)
line_dark = 140       # looser threshold for the faint printed underline
line_gap = 8          # px: bridge anti-aliasing breaks in the underline
min_line_run = 110    # px: min run length to count as the underline
max_line_frac = 0.85  # runs longer than this fraction of column width are borders
border_frac = 0.80    # a contest-box bottom separator run length fraction
min_indent = 70       # px: the write-in underline starts right of the oval
col_w_frac = 0.22     # contest column width as a fraction of page width
search_frac = 0.34    # how far below the header to search for the write-in line
# Vision-crop offsets (px) from the detected line y / column x.
region_top_off = 60
region_bot_off = 26
oval_left_off = 54
oval_top_off = 30
oval_right_off = 2
oval_bot_off = 6

[mark]
# Mark-detection thresholds in dark-ratio units (stage 3). Margins sit above the
# per-layout blank baseline; absolutes are the fallback for sparse layouts.
oval_margin = 0.12
line_margin = 0.07
oval_abs = 0.18
line_abs = 0.11
min_samples = 8
baseline_pctl = 30
hand_band_top = 32    # px: handwriting band height above the underline
hand_band_bot = 4     # px: lower edge of that band above the underline

[telemetry]
# OpenTelemetry instrumentation, off by default. Requires the optional deps
# (pip install -e ".[telemetry]"); otherwise it is a graceful no-op. Quick on:
# WRITEIN_TELEMETRY=1. Metrics: vision read latency, per-stage duration and
# throughput, funnel counts, layout-cache hit/miss, in-flight vision concurrency.
enabled = false
service_name = "writein-count"
otlp = true          # export over OTLP/HTTP (SigNoz collector, etc.)
console = false      # also print metrics/spans to stdout
# Base OTLP URL; the signal paths /v1/metrics and /v1/traces are appended.
# Falls back to $OTEL_EXPORTER_OTLP_ENDPOINT. For a local SigNoz: http://localhost:4318
endpoint = ""
# "key=value,key2=value2"; falls back to $OTEL_EXPORTER_OTLP_HEADERS.
# SigNoz Cloud needs: signoz-access-token=<token>
headers = ""
export_interval_ms = 5000

[filename]
# Regex with named groups `box` and `seq` matched against each image filename,
# and the box-directory prefix scanned under images_root.
pattern = '(?P<box>AB-\d+)\+(?P<seq>\d+)\.jpe?g$'
box_prefix = "AB-"

# Known candidates to fold near-identical reads onto, so OCR/handwriting noise
# doesn't fragment one person into dozens of spellings. `aliases` lists the full
# name plus the surname (the surname catches garbled reads like "c drazen").
[[candidates]]
name = "pencil"
aliases = ["pencil"]

[[candidates]]
name = "christine drazan"
aliases = ["christine drazan", "drazan"]

[[candidates]]
name = "chris dudley"
aliases = ["chris dudley", "dudley"]

[[candidates]]
name = "ed diehl"
aliases = ["ed diehl", "diehl"]

[[candidates]]
name = "tina kotek"
aliases = ["tina kotek", "kotek"]

[[candidates]]
name = "nick kristof"
aliases = ["nick kristof", "nicholas kristof", "kristof"]

[[candidates]]
name = "erin lagesen"
aliases = ["erin lagesen", "erin c lagesen", "lagesen"]

[[candidates]]
name = "dan rayfield"
aliases = ["dan rayfield", "rayfield"]

[[candidates]]
name = "betsy johnson"
aliases = ["betsy johnson"]
